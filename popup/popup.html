<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>ErgoFocus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-wrap">
    <div class="mode-tabs">
      <button class="mode-btn active" data-mode="focus">Fokus</button>
      <button class="mode-btn" data-mode="shortBreak">Kurze Pause</button>
      <button class="mode-btn" data-mode="longBreak">Lange Pause</button>
    </div>

    <div class="timer-section">
      <svg class="progress-ring" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="54"/>
        <circle id="progressCircle" class="ring-fg" cx="60" cy="60" r="54"
          stroke-dasharray="339.29"
          stroke-dashoffset="0"
          transform="rotate(-90 60 60)"/>
      </svg>
      <div class="timer-center">
        <div id="timer" class="timer-text">20:00</div>
        <div id="modeLabel" class="mode-label">Fokus</div>
      </div>
    </div>

    <div class="controls">
      <button id="resetBtn" class="ctrl-btn">↺</button>
      <button id="playBtn"  class="ctrl-btn main">▶</button>
      <button id="settingsBtn" class="ctrl-btn">⚙</button>
    </div>

    <div id="sessionCount" class="session-info">🍅 0 / 4 bis lange Pause</div>

    <div class="auto-loop-row">
      <label class="toggle">
        <input type="checkbox" id="autoLoopToggle">
        <span class="slider"></span>
      </label>
      <span id="autoLoopLabel" class="auto-loop-label">Auto-Loop</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
